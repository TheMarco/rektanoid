<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-ogp-key" content="d8ff06b7-76f6-4577-9eb7-2560fea24c69" id="ogp-key-meta" />
  <title>Rektanoid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-container { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }
    #hud {
      position: absolute;
      bottom: 5px;
      left: 0;
      right: 0;
      padding: 4px 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #00ff88;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 8px currentColor;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    #hud span { margin-right: 16px; }
    #ticker {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 22px;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #446688;
      pointer-events: none;
      z-index: 10;
      background: rgba(0,2,8,0.6);
      border-bottom: 1px solid rgba(34,102,204,0.15);
    }
    #ticker-content {
      display: inline-block;
      white-space: nowrap;
      animation: scroll-ticker 40s linear infinite;
      line-height: 22px;
    }
    @keyframes scroll-ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    #ticker-content .up { color: #00cc66; }
    #ticker-content .down { color: #cc3333; }
    #ticker-content .sep { color: #334455; margin: 0 12px; }
    #callouts {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 15;
      overflow: hidden;
    }
    .callout {
      position: absolute;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
      pointer-events: none;
      animation: callout-rise 1.2s ease-out forwards;
      white-space: nowrap;
    }
    @keyframes callout-rise {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      60% { opacity: 1; transform: translateY(-40px) scale(1.15); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: transparent;
      z-index: 20;
      pointer-events: auto;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ticker"><div id="ticker-content"></div></div>
    <div id="hud"></div>
    <div id="callouts"></div>
    <div id="overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
